trigger:
- '*'

variables:
  buildConfiguration: 'Release'
  releaseBranchName: 'release'

stages:
  - stage: 'Build'
    displayName: 'Build the web application'
    jobs:
    - job: 'Build'
      displayName: 'Build job'
      pool:
        vmImage: 'ubuntu-22.04'
        demands:
        - npm

      variables:
        wwwrootDir: 'Tailspin.SpaceGame.Web/wwwroot'
        dotnetSdkVersion: '8.x'
        nodeVersion: '18.x'
      
      steps:
      - task: UseDotNet@2
        displayName: 'Use .Net SDK $(dotnetSdkVersion)'
        inputs:
          version: '$(dotnetSdkVersion)'

      - task: NodeTool@0
        displayName: 'Use Node.js $(nodeVersion)'
        inputs:
          versionSpec: '$(nodeVersion)'

      - task: Npm@1
        displayName: 'Run npm install'
        inputs:
          verbose: false

      - script: 'npx sass $(wwwrootDir):$(wwwrootDir)'
        displayName: 'Compile Sass assets'

      - task: gulp@1
        displayName: 'Run gulp tasks'

      - script: 'echo "$(Build.DefinitionName), $(Build.BuildId), $(Build.BuildNumber)" > buildinfo.txt'
        displayName: 'Write build info'
        workingDirectory: $(wwwrootDir)

      - task: DotNetCoreCLI@2
        displayName: 'Resote project dependencies'
        inputs:
          command: 'restore'
          projects: '**/*.csproj'

      - task: DotNetCoreCLI@2
        displayName: 'Build the project - $(buildConfiguration)'
        inputs:
          command: 'build'
          arguments: '--no-restore --configuration $(buildConfiguration)'
          projects: '**/*.csproj'

      - task: DotNetCoreCLI@2
        displayName: 'Publish the project - $(buildConfiguration)'
        inputs:
          command: 'publish'
          projects: '**/*.csproj'
          publishWebProjects: false
          arguments: '--no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/$(buildConfiguration)'
          zipAfterPublish: true
      
      - publish: '$(Build.ArtifactStagingDirectory)'
        artifact: drop

  - stage: 'Dev'
    displayName: 'Deploy to the dev environment'
    dependsOn: Build
    condition: succeeded()
    jobs:
    - deployment: Deploy
      pool:
        vmImage: 'ubuntu-22.04'
      environment: dev
      variables:
      - group: 'Release'
      strategy:
        runOnce:
          deploy:
            steps:
            - download: current
              artifact: drop
            - task: AzureWebApp@1
              inputs:
                azureSubscription: 'Subscription_cicd(1)(c78e9653-2dd1-49b6-bd4b-fdc49529105f)'
                appType: 'webAppLinux'
                appName: '$(WebAppNameDev)'
                resourceGroupName: 'tailspin-space-game-rg'
                package: '$(Pipeline.Workspace)/drop/$(buildConfiguration)/*.zip'
                runtimeStack: 'DOTNETCORE|8.0'
  
  - stage: 'Staging'
    displayName: 'Deploy to the staging environment'
    dependsOn: Dev
    condition: succeeded()
    jobs:
    - deployment: Deploy
      pool:
        vmImage: 'ubuntu-22.04'
      environment: staging
      variables:
      - group: 'Release'
      strategy:
        runOnce:
          deploy:
            steps:
            - download: current
              artifact: drop
            - task: AzureWebApp@1
              inputs:
                azureSubscription: 'Subscription_cicd(1)(c78e9653-2dd1-49b6-bd4b-fdc49529105f)'
                appType: 'webAppLinux'
                appName: '$(WebAppNameStaging)'
                resourceGroupName: 'tailspin-space-game-rg'
                package: '$(Pipeline.Workspace)/drop/$(buildConfiguration)/*.zip'
                runtimeStack: 'DOTNETCORE|8.0'

  - stage: 'Production'
    displayName: 'Deploy to the production environment'
    dependsOn: Staging
    condition: succeeded()
    jobs:
    - job: Echo
      displayName: 'Production echo'
      pool:
        vmImage: 'ubuntu-22.04'
      steps:
      - script: echo 'Ready for production deployment.'
        displayName: 'Echo message'
